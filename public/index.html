<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizzería Don Node - Realizar Pedido</title>
    <link rel="stylesheet" href="/stylesheet.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-danger">
        <div class="container">
            <a class="navbar-brand" href="/">Pizzería Don Node</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" aria-current="page" href="/">Nuevo pedido</a></li>
                    <li class="nav-item"><a class="nav-link" href="/pedidos">Ver pedidos</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <h1 class="h3">Registrar nuevo pedido</h1>
                        <p class="text-muted">Completa el formulario y registra tu pizza de forma rápida.</p>

                        <form action="/pedidos" method="POST" onsubmit="return validarFormulario()">
                            <div class="mb-3">
                                <label for="nombre" class="form-label">Nombre del Cliente</label>
                                <input type="text" id="nombre" name="nombre" required class="form-control" placeholder="Ej. Juan Pérez">
                            </div>

                            <div class="mb-3">
                                <label for="tamano" class="form-label">Tamaño de la pizza</label>
                                <select id="tamano" name="tamano" required class="form-select">
                                    <option value="Chica">Chica (Base: $3.990 / Extra: $500)</option>
                                    <option value="Mediana" selected>Mediana (Base: $5.990 / Extra: $800)</option>
                                    <option value="Grande">Grande (Base: $8.490 / Extra: $1.200)</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Ingredientes</label>
                                <div class="row row-cols-1 row-cols-md-2 g-2">
                                    <div class="col"><div class="form-check"><input class="form-check-input" type="checkbox" name="ingredientes" value="Jamón" id="ing-jamon"><label class="form-check-label" for="ing-jamon">Jamón</label></div></div>
                                    <div class="col"><div class="form-check"><input class="form-check-input" type="checkbox" name="ingredientes" value="Queso extra" id="ing-queso"><label class="form-check-label" for="ing-queso">Queso extra</label></div></div>
                                    <div class="col"><div class="form-check"><input class="form-check-input" type="checkbox" name="ingredientes" value="Champiñones" id="ing-champi"><label class="form-check-label" for="ing-champi">Champiñones</label></div></div>
                                    <div class="col"><div class="form-check"><input class="form-check-input" type="checkbox" name="ingredientes" value="Aceitunas" id="ing-aceitunas"><label class="form-check-label" for="ing-aceitunas">Aceitunas</label></div></div>
                                    <div class="col"><div class="form-check"><input class="form-check-input" type="checkbox" name="ingredientes" value="Cebolla" id="ing-cebolla"><label class="form-check-label" for="ing-cebolla">Cebolla</label></div></div>
                                    <div class="col"><div class="form-check"><input class="form-check-input" type="checkbox" name="ingredientes" value="Pimentón" id="ing-pimenton"><label class="form-check-label" for="ing-pimenton">Pimentón</label></div></div>
                                    <div class="col"><div class="form-check"><input class="form-check-input" type="checkbox" name="ingredientes" value="Tocino" id="ing-tocino"><label class="form-check-label" for="ing-tocino">Tocino</label></div></div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="cantidad" class="form-label">Cantidad de pizzas</label>
                                <input type="number" id="cantidad" name="cantidad" value="1" min="1" required class="form-control" style="max-width: 140px;">
                            </div>

                            <button type="submit" class="btn btn-danger btn-lg">Registrar pedido</button>
                        </form>
                    </div>
                </div>

                <div class="text-center">
                    <a class="btn btn-outline-danger" href="/pedidos">Ver lista de pedidos</a>
                </div>
            </div>
        </div>
    </main>

    <script src="/bootstrap.bundle.min.js"></script>
    <script>
        function validarFormulario() {
            const checkboxes = document.querySelectorAll('input[name="ingredientes"]:checked');
            if (checkboxes.length === 0) {
                alert('Debes seleccionar al menos 1 ingrediente para tu pizza.');
                return false;
            }
            return true;
        }
    </script>
</body>
</html>

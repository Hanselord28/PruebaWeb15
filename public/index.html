<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizzería Don Node - Realizar Pedido</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 20px auto; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        .checkbox-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { background-color: #ff4757; color: white; border: none; padding: 10px 15px; cursor: pointer; font-size: 16px; border-radius: 5px; }
        button:hover { background-color: #e84118; }
        .nav-link { display: inline-block; margin-top: 15px; color: #1e90ff; text-decoration: none; }
    </style>
</head>
<body>

    <h1> Pizzería Don Node</h1>
    <h2>Registrar Pedido</h2>

    <form action="/pedidos" method="POST" onsubmit="return validarFormulario()">
        <div class="form-group">
            <label for="nombre">Nombre del Cliente:</label>
            <input type="text" id="nombre" name="nombre" required placeholder="Ej. Juan Pérez" style="width: 100%; padding: 8px;">
        </div>

        <div class="form-group">
            <label for="tamano">Tamaño de la Pizza:</label>
            <select id="tamano" name="tamano" required style="width: 100%; padding: 8px;">
                <option value="Chica">Chica (Base: $3.990 / Extra: $500)</option>
                <option value="Mediana" selected>Mediana (Base: $5.990 / Extra: $800)</option>
                <option value="Grande">Grande (Base: $8.490 / Extra: $1.200)</option>
            </select>
        </div>

        <div class="form-group">
            <label>Selecciona tus ingredientes (Mínimo 1, hasta 3 incluidos en base):</label>
            <div class="checkbox-group">
                <label><input type="checkbox" name="ingredientes" value="Jamón"> Jamón</label>
                <label><input type="checkbox" name="ingredientes" value="Queso extra"> Queso extra</label>
                <label><input type="checkbox" name="ingredientes" value="Champiñones"> Champiñones</label>
                <label><input type="checkbox" name="ingredientes" value="Aceitunas"> Aceitunas</label>
                <label><input type="checkbox" name="ingredientes" value="Cebolla"> Cebolla</label>
                <label><input type="checkbox" name="ingredientes" value="Pimentón"> Pimentón</label>
                <label><input type="checkbox" name="ingredientes" value="Tocino"> Tocino</label>
            </div>
        </div>

        <div class="form-group">
            <label for="cantidad">Cantidad de pizzas:</label>
            <input type="number" id="cantidad" name="cantidad" value="1" min="1" required style="width: 80px; padding: 8px;">
        </div>

        <button type="submit">Registrar Pedido</button>
    </form>

    <a class="nav-link" href="/pedidos"> Ver la lista de pedidos</a>

    <script>
        function validarFormulario() {
            const checkboxes = document.querySelectorAll('input[name="ingredientes"]:checked');
            if (checkboxes.length === 0) {
                alert("Debes seleccionar al menos 1 ingrediente para tu pizza.");
                return false;
            }
            return true;
        }
    </script>
</body>
</html>
